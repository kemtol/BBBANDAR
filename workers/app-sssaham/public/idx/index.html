<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0b0e" />

    <script>
        (function () {
            const STORAGE_KEY = 'ui:theme';
            const root = document.documentElement;
            try {
                const saved = window.localStorage ? localStorage.getItem(STORAGE_KEY) : null;
                const theme = saved || 'dark';
                root.setAttribute('data-theme', theme);
                root.style.colorScheme = theme === 'dark' ? 'dark' : 'light';
            } catch (error) {
                root.setAttribute('data-theme', 'dark');
                root.style.colorScheme = 'dark';
            }
        })();
    </script>

    <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">

    <div id="app" class="container mb-3" style="display:none;">

        document.addEventListener("DOMContentLoaded", () => {

                const app = document.getElementById("app");
                if (loader) loader.style.display = "none";
                if (app) app.style.display = "block";

    <script>
        const WORKER_BASE_URL = "https://api-saham.mkemalw.workers.dev";

        function escapeHtml(value) {
            return String(value || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function relativeTimeFrom(dateStr) {
            const ts = Date.parse(dateStr || '');
            if (!Number.isFinite(ts)) return '-';
            const delta = Date.now() - ts;
            const mins = Math.round(delta / 60000);
            if (mins < 1) return 'baru saja';
            if (mins < 60) return `${mins} menit lalu`;
            const hours = Math.round(mins / 60);
            if (hours < 24) return `${hours} jam lalu`;
            const days = Math.round(hours / 24);
            return `${days} hari lalu`;
        }

        function upcomingLabel(dateStr, timeStr) {
            const todayWib = getWibDateString();
            const eventDate = String(dateStr || '').trim();
            if (/^\d{4}-\d{2}-\d{2}$/.test(eventDate) && eventDate === todayWib) {
                return 'hari ini';
            }
            const iso = `${dateStr || ''}T${(timeStr || '00:00')}:00+07:00`;
            const ts = Date.parse(iso);
            if (!Number.isFinite(ts)) return '-';
            const delta = ts - Date.now();
            if (delta <= 0) return 'sudah lewat';
            const mins = Math.round(delta / 60000);
            if (mins < 60) return `dalam ${mins} menit`;
            const hrs = Math.round(mins / 60);
            if (hrs < 24) return `dalam ${hrs} jam`;
            const days = Math.round(hrs / 24);
            return `dalam ${days} hari`;
        }

        function getWibDateString(date = new Date()) {
            const parts = new Intl.DateTimeFormat('en-CA', {
                timeZone: 'Asia/Jakarta',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            }).formatToParts(date);
            const get = (type) => parts.find((p) => p.type === type)?.value || '';
            const yyyy = get('year');
            const mm = get('month');
            const dd = get('day');
            return `${yyyy}-${mm}-${dd}`;
        }

        function getWibEndOfMonthString() {
            const now = new Date();
            const parts = new Intl.DateTimeFormat('en-CA', {
                timeZone: 'Asia/Jakarta',
                year: 'numeric',
                month: '2-digit'
            }).formatToParts(now);
            const get = (type) => parts.find((p) => p.type === type)?.value || '';
            const yyyy = Number(get('year'));
            const mm = Number(get('month'));
            const lastDay = new Date(yyyy, mm, 0).getDate();
            return `${String(yyyy)}-${String(mm).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;
        }

        function filterCatalystCurrentMonthUpcoming(items) {
            if (!Array.isArray(items)) return [];
            const todayWib = getWibDateString();
            const validItems = items.filter((it) => {
                const d = String(it?.event_date || '').trim();
                if (!/^\d{4}-\d{2}-\d{2}$/.test(d)) return false;
                return true;
            });

            // Show longer horizon so month+1..+3 (Mei/Juni/Juli) tetap tampil.
            const upcoming180d = new Date(Date.now() + (180 * 86400000)).toISOString().slice(0, 10);
            const upcoming = validItems
                .filter((it) => {
                    const d = String(it?.event_date || '').trim();
                    return d >= todayWib && d <= upcoming180d;
                })
                .sort((a, b) => {
                    const da = String(a?.event_date || '');
                    const db = String(b?.event_date || '');
                    if (da !== db) return da.localeCompare(db);
                    return String(a?.symbol || '').localeCompare(String(b?.symbol || ''));
                });

            if (upcoming.length) return upcoming;

            // Fallback: tampilkan histori terbaru 60 hari supaya tidak blank.
            const recent60d = new Date(Date.now() - (60 * 86400000)).toISOString().slice(0, 10);
            return validItems
                .filter((it) => {
                    const d = String(it?.event_date || '').trim();
                    return d < todayWib && d >= recent60d;
                })
                .sort((a, b) => String(b?.event_date || '').localeCompare(String(a?.event_date || '')))
                .slice(0, 24);
        }

        let timelineLogoSyncTimer = null;

        function syncTimelineLogoDots() {
            const items = document.querySelectorAll('.timeline .timeline-item');
            items.forEach((item) => {
                const dot = item.querySelector('.timeline-dot.logo-dot');
                const card = item.querySelector('.timeline-card');
                if (!dot || !card) return;

                const cardHeight = card.offsetHeight || 0;
                if (!cardHeight) return;

                const size = 36;
                const timeEl = item.querySelector('.timeline-time');
                const timeStyle = timeEl ? window.getComputedStyle(timeEl) : null;
                const timeMarginBottom = timeStyle ? parseFloat(timeStyle.marginBottom || '0') : 0;
                const timeBlockHeight = timeEl ? (timeEl.offsetHeight + (Number.isFinite(timeMarginBottom) ? timeMarginBottom : 0)) : 0;
                const top = Math.max(0, timeBlockHeight + ((cardHeight - size) / 2));

                item.style.setProperty('--logo-dot-size', `${size}px`);
                item.style.setProperty('--logo-dot-top', `${top}px`);
            });
        }

        function scheduleTimelineLogoDotSync() {
            if (timelineLogoSyncTimer) window.clearTimeout(timelineLogoSyncTimer);
            timelineLogoSyncTimer = window.setTimeout(() => {
                timelineLogoSyncTimer = null;
                syncTimelineLogoDots();
            }, 0);
        }

        function timelineDotHtml(dotClass, symbol) {
            const s = String(symbol || '').trim().toUpperCase();
            if (!s) return `<div class="timeline-dot ${dotClass}"></div>`;
            const logo = `${WORKER_BASE_URL}/logo?symbol=${encodeURIComponent(s)}`;
            return `<div class="timeline-dot logo-dot ${dotClass}"><img src="${logo}" alt="${escapeHtml(s)}" onerror="this.parentElement.classList.remove('logo-dot'); this.parentElement.innerHTML='';"></div>`;
        }

        function slugifyText(v) {
            return String(v || '')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '')
                .replace(/-{2,}/g, '-');
        }

        function buildFeedDetailSlug(item) {
            const created = new Date(item?.created_at || Date.now());
            const y = created.getFullYear();
            const m = String(created.getMonth() + 1).padStart(2, '0');
            const d = String(created.getDate()).padStart(2, '0');
            const symbol = String(item?.symbol || '').toUpperCase() || 'EMITEN';
            const title = String(item?.title || 'update');
            const titleWithoutSymbol = title
                .replace(new RegExp(`^${symbol}\\s*`, 'i'), '')
                .replace(/[•|:]/g, ' ')
                .trim();
            const reco = slugifyText(titleWithoutSymbol || 'update') || 'update';
            return `${y}-${m}-${d}-${symbol}-${reco}`;
        }

        function openFeedDetail(item) {
            // Deprecated: redirect to broker-summary page instead of inline feed detail
            const symbol = String(item?.symbol || '').toUpperCase();
            if (symbol) {
                window.location.href = `/idx/emiten/broker-summary.html?kode=${encodeURIComponent(symbol)}`;
                return;
            }
            // Fallback: try to extract symbol from slug
            const slug = String(item?.slug || '').trim();
            const m = slug.match(/^\d{4}-\d{2}-\d{2}-([A-Z0-9]+)-/i);
            if (m) {
                window.location.href = `/idx/emiten/broker-summary.html?kode=${encodeURIComponent(m[1].toUpperCase())}`;
                return;
            }
            // Last resort: old behavior
            const url = `${window.location.pathname}?feed=${encodeURIComponent(slug)}`;
            window.location.href = url;
        }

        function backToFeedList() {
            window.location.href = window.location.pathname;
        }

        function setFeedDetailMode(isDetail) {
            const listSection = document.getElementById('content');
            const detailSection = document.getElementById('feed-detail-section');
            if (listSection) listSection.classList.toggle('d-none', !!isDetail);
            if (detailSection) detailSection.classList.toggle('d-none', !isDetail);
        }

        function formatLocalDateTime(v) {
            const ts = Date.parse(String(v || ''));
            if (!Number.isFinite(ts)) return '-';
            return new Date(ts).toLocaleString('id-ID', {
                year: 'numeric', month: 'short', day: '2-digit',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function renderFeedDetail(payload, slug) {
            const root = document.getElementById('feed-detail-card');
            if (!root) return;

            if (!payload?.ok || !payload?.item) {
                root.innerHTML = `<div class="timeline-title variant-red">Detail tidak ditemukan</div><p class="timeline-text mb-0">Feed dengan slug <strong>${escapeHtml(slug || '-')}</strong> tidak tersedia.</p>`;
                return;
            }

            const item = payload.item || {};
            const detail = payload.detail || {};
            const analysis = detail.analysis || {};
            const recID = analysis?.kesimpulan_rekomendasi || {};
            const recEN = analysis?.recommendation || {};
            const confidence = Number(item?.meta?.confidence ?? recID?.confidence ?? recEN?.confidence ?? 0) || 0;

            const reasons = Array.isArray(recID?.alasan_rating)
                ? recID.alasan_rating
                : (typeof recEN?.rationale === 'string' && recEN.rationale.trim() ? [recEN.rationale.trim()] : []);

            const screenshots = Array.isArray(detail?.screenshots) ? detail.screenshots : [];
            const screenshotsHtml = screenshots.length
                ? `<div class="timeline-tags mb-2">${screenshots.map((s, idx) => `<a href="${escapeHtml(s?.url || '#')}" target="_blank" rel="noopener noreferrer">Screenshot ${idx + 1}</a>`).join('')}</div>`
                : '<p class="timeline-text mb-2">Tidak ada screenshot terkait.</p>';

            const raw = typeof detail?.analysis_raw === 'string' ? detail.analysis_raw.trim() : '';
            const rawHtml = raw
                ? `<details class="mt-2"><summary class="timeline-time">Lihat output mentah AI</summary><pre class="small mt-2 mb-0" style="white-space: pre-wrap; color: var(--text-secondary);">${escapeHtml(raw)}</pre></details>`
                : '';

            root.innerHTML = `
                <div class="d-flex align-items-center justify-content-between mb-2">
                    <div class="primary mb-0">${escapeHtml(item?.title || 'AI Analysis')}</div>
                    <div class="">${escapeHtml(formatLocalDateTime(item?.created_at))}</div>
                </div>
                <p class="mb-2">${escapeHtml(item?.body || '-')}</p>
                <div class="timeline-tags mb-3">
                    <span>#${escapeHtml(item?.symbol || '-')}</span>
                    <span>#confidence-${Math.round(confidence)}%</span>
                    <span>#${escapeHtml(detail?.provider || item?.meta?.provider || 'provider')}</span>
                </div>
                <div class="timeline-card variant-blue mb-3">
                    <div class="variant-blue">Ringkasan Rekomendasi</div>
                    <p class="timeline-text mb-1"><strong>Rating:</strong> ${escapeHtml(recID?.rating || recID?.rekomendasi || recEN?.position || '-')}</p>
                    <p class="timeline-text mb-0"><strong>Rentang Data:</strong> ${escapeHtml(detail?.date_range?.from || item?.meta?.from || '-')} → ${escapeHtml(detail?.date_range?.to || item?.meta?.to || '-')}</p>
                </div>
                <div class="timeline-card variant-purple mb-3">
                    <div class="variant-purple">Alasan Utama</div>
                    ${reasons.length ? `<ul class="mb-0">${reasons.map((r) => `<li class="timeline-text mb-1">${escapeHtml(r)}</li>`).join('')}</ul>` : '<p class="timeline-text mb-0">Tidak ada alasan detail tersimpan.</p>'}
                </div>
                <div class="timeline-card mb-2">
                    <div class="">Lampiran</div>
                    ${screenshotsHtml}
                    ${rawHtml}
                </div>
            `;
        }

        async function loadFeedDetail(slug) {
            setFeedDetailMode(true);
            const root = document.getElementById('feed-detail-card');
            if (root) root.innerHTML = '<p class="timeline-text mb-0">Memuat detail...</p>';

            try {
                const resp = await fetch(`${WORKER_BASE_URL}/dashboard/feed/detail?slug=${encodeURIComponent(slug)}`);
                const data = await resp.json().catch(() => ({ ok: false }));
                renderFeedDetail(data, slug);
            } catch (error) {
                console.error('[dashboard] feed detail failed', error);
                renderFeedDetail({ ok: false }, slug);
            }
        }

        function renderFeed(items) {
            const root = document.getElementById('feed-timeline');
            if (!root) return;
            const line = '<div class="timeline-line"></div>';

            if (!Array.isArray(items) || items.length === 0) {
                root.innerHTML = `${line}<div class="timeline-item"><div class="timeline-dot"></div><div class="timeline-time">-</div><div class="timeline-card"><div class="timeline-title">Feed</div><p class="timeline-text">Belum ada feed terbaru.</p></div></div>`;
                return;
            }

            const recommendationTitleClass = (rawTitle) => {
                const t = String(rawTitle || '');
                if (/\bSELL\b/i.test(t)) return 'variant-red';
                if (/\bHOLD\b/i.test(t)) return 'variant-blue';
                if (/\bBUY\b/i.test(t)) return 'success';
                return 'primary';
            };

            const html = items.map((it, i) => {
                const dotClass = i === 0 ? 'primary' : 'success';
                const rawTitle = String(it?.title || 'AI Analysis');
                const titleClass = recommendationTitleClass(rawTitle);
                const body = escapeHtml(it?.body || 'Analisis terbaru tersedia.');
                const symbol = escapeHtml(it?.symbol || '');
                const slug = encodeURIComponent(String(it?.slug || buildFeedDetailSlug(it)));
                // Split title: "SYMBOL RATING: headline..." → colored prefix + white headline
                const prefixMatch = rawTitle.match(/^([A-Z0-9]+\s+(?:STRONG[_ ])?(?:BUY|SELL|HOLD|AI Update))(?::\s*(.*))?$/i);
                let titleHtml;
                if (prefixMatch) {
                    const prefix = escapeHtml(prefixMatch[1]);
                    const headline = prefixMatch[2] ? escapeHtml(prefixMatch[2]) : '';
                    titleHtml = `<span class="${titleClass}">${prefix}:</span>${headline ? ` ${headline}` : ''}`;
                } else {
                    titleHtml = `<span class="${titleClass}">${escapeHtml(rawTitle)}</span>`;
                }
                return `<div class="timeline-item">
                    ${timelineDotHtml(dotClass, symbol)}
                    <div class="timeline-time">${relativeTimeFrom(it?.created_at)}</div>
                    <div class="timeline-card feed-clickable" data-feed-slug="${slug}" data-symbol="${symbol}" onclick="openFeedDetail({ slug: decodeURIComponent(this.dataset.feedSlug), symbol: this.dataset.symbol })">
                        <div class="timeline-title">${titleHtml}</div>
                        <p class="timeline-text">${body}</p>

            if (!Number.isFinite(ts)) return dateIso;
            return new Date(ts).toLocaleDateString('en-GB', {

            const txt = String(raw || '');

            const type = String(it?.type || '').toLowerCase();
            const desc = String(it?.description || '').trim();
            const phase = String(it?.phase || '').toLowerCase();

            if (type === 'rups') {
                return {
                    name: 'RUPS',
                    tag: extractJamLabel(desc) || null
                };
            }

            if (/public\s*expose/i.test(desc)) {
                return { name: 'Public Expose', tag: 'Public Expose' };
            }

            if (/dividen/i.test(desc)) {
                const phaseMap = {
                    rec: 'Recording',
                    start: 'Distribution',
                    end: 'Distribution End',
                    cum: 'Cum Date',
                    ex: 'Ex Date',
                    listend: 'Listed'
                };
                return {
                    name: 'Cash Dividend',
                    tag: phaseMap[phase] || null
                };
            }

            if (/saham\s*bonus/i.test(desc)) {
                return { name: 'Bonus Shares', tag: null };

                if (!obj?.ts || !Array.isArray(obj.items)) return null;
                if (Date.now() - obj.ts > _DASHBOARD_TTL) {
                    localStorage.removeItem(key);

            } catch (e) { return null; }

        function getTimeInTimezone(tz) {
            const now = new Date();
            const options = { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false };
            const timeStr = now.toLocaleTimeString('en-GB', options);
            const [hours, minutes] = timeStr.split(':').map(Number);

        function isMarketOpen(session, hours) {
            // Check if weekday (Mon-Fri)

            const dayOptions = { timeZone: session.tz, weekday: 'short' };
            const day = now.toLocaleDateString('en-US', dayOptions);
            const isWeekday = !['Sat', 'Sun'].includes(day);

            return isWeekday && hours >= session.open && hours < session.close;
        }

        function updateClocks() {

                if (timeEl) timeEl.textContent = timeStr;

                // Update clock hands

                const minuteDeg = minutes * 6;

                const hourEl = document.getElementById(`${city}-hour`);
                const minuteEl = document.getElementById(`${city}-minute`);
                if (hourEl) hourEl.style.transform = `rotate(${hourDeg}deg)`;
                if (minuteEl) minuteEl.style.transform = `rotate(${minuteDeg}deg)`;

                // Update market status
                const statusEl = document.getElementById(`${city}-status`);
                const isOpen = isMarketOpen(session, hours);
                if (statusEl) {

                const items = Array.isArray(payload?.items) ? payload.items : [];

                console.log(`[FootprintSummary] loaded ${_footprintMap.size} symbols`);

                // Always fetch yfinance prev_close for all roster symbols.
                // This ensures CHG% = (current_price - prev_close) / prev_close is always
                // computed correctly, even when backend's processed/{today}.json is stale

                if (_rosterRows.length) {

        /**
         * Fetch close + prev_close from yfinance/D1 data.
         * Populates _closePriceMap for LAST price display and CHG% computation.
         */
        async function _fetchPrevClose(symbols) {
            if (!symbols.length) return;
            try {
                const symbolsQuery = encodeURIComponent(symbols.join(','));
                const resp = await fetch(
                    `${WORKER_BASE_URL}/prev-close?symbols=${symbolsQuery}`,
                    { signal: AbortSignal.timeout(8000) }
                );
                if (!resp.ok) return;
                const payload = await resp.json();
                const data = payload?.data || {};
                let enriched = 0;
                for (const [sym, info] of Object.entries(data)) {
                    // Store in _closePriceMap (authoritative source for LAST + CHG%)
                    _closePriceMap.set(sym, {
                        close:      info.close ?? null,
                        close_date: info.close_date ?? null,
                        prev_close: info.prev_close ?? null,
                        prev_date:  info.prev_date ?? null,
                    });

                    // Also enrich _footprintMap for backward compat (CHG% fallback)
                    const existing = _footprintMap.get(sym) || {};
                    if (info.prev_close > 0) {
                        existing.open_price = info.prev_close;
                    }
                    if (info.close > 0) {
                        existing.recent_price = info.close;
                    }
                    // Recompute growth_pct from dual prices
                    if (info.close > 0 && info.prev_close > 0) {
                        existing.growth_pct = ((info.close - info.prev_close) / info.prev_close) * 100;
                    }
                    _footprintMap.set(sym, existing);
                    enriched++;
                }
                if (enriched > 0) {
                    console.log(`[PrevClose] enriched ${enriched} symbols with dual close prices`);
                    if (_rosterRows.length) renderRosterTable(_rosterRows, false);
                }
            } catch (e) {
                console.warn('[PrevClose] fetch failed:', e.message);
            }
        }

        /**
         * Rank trail sparkline — inverted Y axis (rank 1 at top).
         * Null points render as gaps.
         */
        function rosterSpark(trail) {
            const arr = Array.isArray(trail) ? trail.slice(-20) : [];
            const w = 124, h = 32;
            if (!arr.length) return `<div class="roster-spark-wrap"><svg class="roster-spark" viewBox="0 0 ${w} ${h}"></svg></div>`;
            const valid = arr.filter(v => v !== null);
            if (!valid.length) return `<div class="roster-spark-wrap"><svg class="roster-spark" viewBox="0 0 ${w} ${h}"></svg></div>`;
            const maxR = Math.max(...valid);
            const minR = Math.min(...valid);
            const span = Math.max(1, maxR - minR);
            // Build segments; null breaks the path
            let segments = [];
            let current = [];
            arr.forEach((v, i) => {
                const x = (i / Math.max(1, arr.length - 1)) * (w - 2) + 1;
                if (v === null) {
                    if (current.length) { segments.push(current); current = []; }
                } else {
                    // Invert: rank 1 → top (y near 0), high rank → bottom
                    const y = h - 2 - ((v - minR) / span) * (h - 4);
                    current.push(`${x},${y}`);
                }
            });
            if (current.length) segments.push(current);
            const first = valid[0], last = valid[valid.length - 1];
            const trendColor = last <= first ? '#22c55e' : '#f43f5e'; // lower rank = better
            const lines = segments
                .map(pts => `<polyline points="${pts.join(' ')}" fill="none" stroke="${trendColor}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`)
                .join('');
            return `<div class="roster-spark-wrap"><svg class="roster-spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${lines}</svg></div>`;
        }

        /**
         * Pressure IDX — 1-minute sparkline (full trading day, max 360 nodes).
         * Trail data is pre-aggregated into 1-min bucket averages by the pipeline.
         * Renders as area-line chart. Green rising, red falling.
         */
        function pressureSpark(trail) {
            const arr = Array.isArray(trail) ? trail : [];
            const w = 140, h = 32;
            const empty = `<div class="roster-spark-wrap"><svg class="roster-spark" viewBox="0 0 ${w} ${h}"><text x="${w/2}" y="${h/2 + 3}" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="8">—</text></svg></div>`;
            if (arr.length < 1) return empty;

            // Auto-scale Y axis to min-max of data so fluctuations are clearly visible
            const pad = 4;
            let minV = Infinity, maxV = -Infinity;
            arr.forEach(v => { if (v < minV) minV = v; if (v > maxV) maxV = v; });
            // Ensure minimum range of 5 to avoid flat line when values are very close
            const range = Math.max(maxV - minV, 5);
            // Add 10% padding on each side
            const yMin = minV - range * 0.1;
            const yMax = maxV + range * 0.1;
            const yRange = yMax - yMin;

            const points = arr.map((v, i) => {
                const x = pad + (i / Math.max(1, arr.length - 1)) * (w - pad * 2);
                const normalized = (v - yMin) / yRange; // 0..1
                const y = (h - pad) - normalized * (h - pad * 2);
                return { x, y, v };
            });
            const first = arr[0], last = arr[arr.length - 1];
            const trendColor = last >= first ? '#22c55e' : '#f43f5e';

            let svg = '';

            // Area fill (very low opacity)
            if (points.length > 1) {
                const linePts = points.map(p => `${p.x},${p.y}`).join(' ');
                const areaPath = `M${points[0].x},${h - pad} L${linePts} L${points[points.length-1].x},${h - pad} Z`;
                svg += `<path d="${areaPath}" fill="${trendColor}" fill-opacity="0.10"/>`;
            }

            // Connecting line
            if (points.length > 1) {
                const pts = points.map(p => `${p.x},${p.y}`).join(' ');
                svg += `<polyline points="${pts}" fill="none" stroke="${trendColor}" stroke-width="1.2" stroke-opacity="0.7" stroke-linecap="round" stroke-linejoin="round"/>`;
            }

            // Dots: only show last dot to keep it clean with 60 nodes
            const lastPt = points[points.length - 1];
            svg += `<circle cx="${lastPt.x}" cy="${lastPt.y}" r="2.5" fill="${trendColor}" opacity="0.9"/>`;

            // Last value label
            const labelVal = Math.round(last);
            svg += `<text x="${lastPt.x}" y="${lastPt.y - 5}" text-anchor="middle" fill="${trendColor}" font-size="7" font-weight="600">${labelVal}</text>`;

            return `<div class="roster-spark-wrap"><svg class="roster-spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">${svg}</svg></div>`;
        }

        /** Build score tooltip showing v2 component breakdown */
        function _scoreTooltip(comp) {
            if (!comp || typeof comp !== 'object') return '';
            const lines = [
                `M(CHG%)=${comp.M ?? '—'}`,
                `V(Value)=${comp.V ?? '—'}`,
                `P(Pressure)=${comp.P ?? '—'}`,
                `Ps(P.slope)=${comp.Ps ?? '—'}`,
                `C(CVD)=${comp.C ?? '—'}`,
                `Cs(C.slope)=${comp.Cs ?? '—'}`,
                `B(BSS)=${comp.B ?? '—'}`,
                `O(ATS)=${comp.O ?? '—'}`,
            ];
            if (comp.Div)     lines.push('⚠ Divergence');
            if (comp.Extreme) lines.push('⚠ ExtremeMove');
            if (comp.gated)   lines.push('🔒 Gated (cap 69)');

            return lines.join('&#10;');
        }

        // isStale flag for watermark
        let _rosterIsStale = false;

        // Sorting state
        let _rosterSortKey = 'rank_now';
        let _rosterSortAsc = true;

        function _applySortUI() {
            document.querySelectorAll('#roster-table th.sortable').forEach(th => {
                const key = th.dataset.sort;
                const arrow = th.querySelector('.sort-arrow');
                if (!arrow) return;
                if (key === _rosterSortKey) {
                    arrow.classList.add('active');
                    arrow.classList.remove('fa-sort');
                    arrow.classList.add(_rosterSortAsc ? 'fa-sort-up' : 'fa-sort-down');
                } else {
                    arrow.classList.remove('active', 'fa-sort-up', 'fa-sort-down');
                    arrow.classList.add('fa-sort');
                }
            });
        }

        function _getSortValue(r, key) {
            if (key === 'cvd') {
                const scCvd = _sectorCvdMap.get(r.code)?.cvd_lot;
                return (scCvd != null) ? scCvd : (_footprintMap.get(r.code)?.cvd ?? 0);
            }
            if (key === 'value') {
                return r.value ?? 0;
            }
            if (key === 'last_price') {
                if (r.last_price > 0) return r.last_price;
                const cp = _closePriceMap.get(r.code) || {};
                return cp.close || 0;
            }
            if (key === 'change_pct') {
                if (r.change_pct != null && r.change_pct !== 0) return r.change_pct;
                const cp = _closePriceMap.get(r.code) || {};
                if (cp.close > 0 && cp.prev_close > 0) return ((cp.close - cp.prev_close) / cp.prev_close) * 100;
                const fp = _footprintMap.get(r.code) || {};
                if (fp.growth_pct != null && Number.isFinite(fp.growth_pct)) return fp.growth_pct;
                return 0;
            }
            return r[key] ?? 0;
        }

        function _sortRosterRows(rows) {
            const key = _rosterSortKey;
            const dir = _rosterSortAsc ? 1 : -1;
            return [...rows].sort((a, b) => {
                return (_getSortValue(a, key) - _getSortValue(b, key)) * dir;
            });
        }

        // Attach click handlers to sortable headers (once)
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('#roster-table th.sortable').forEach(th => {
                th.addEventListener('click', () => {
                    const key = th.dataset.sort;
                    if (_rosterSortKey === key) {
                        _rosterSortAsc = !_rosterSortAsc;
                    } else {
                        _rosterSortKey = key;
                        // Default direction: rank = asc, others = desc (highest first)
                        _rosterSortAsc = (key === 'rank_now');
                    }
                    _applySortUI();
                    if (_rosterRows.length) renderRosterTable(_rosterRows, false);
                });
            });
        });

        function renderRosterTable(rows, microOnly = false) {
            const tbody = document.querySelector('#roster-table tbody');
            if (!tbody) return;

            if (!rows || !rows.length) {
                // Don't overwrite if loading row is still showing
                if (document.getElementById('roster-loading-row')) return;
                tbody.innerHTML = `<tr><td colspan="11" class="text-center text-muted py-4">Menunggu data roster…</td></tr>`;
                return;
            }

            // Remove loading row if still present
            _hideRosterLoading();

            const sorted = _sortRosterRows(rows);

            if (microOnly) {
                // Only update BSS/ATS cells without rebuilding the whole table
                sorted.forEach(r => {
                    const row = tbody.querySelector(`tr[data-code="${r.code}"]`);
                    if (!row) return;
                    const ob2 = r.ob2_indicator;
                    const bss = ob2?.bss ?? 50;
                    const ats = ob2?.ats ?? 50;
                    const ob2Missing = ob2?.missing !== false;
                    const bssCell = row.querySelector('.roster-bss-cell');
                    const atsCell = row.querySelector('.roster-ats-cell');
                    if (bssCell) bssCell.innerHTML = ob2Missing
                        ? '<span class="roster-ob2-na" title="Menunggu data OB2…">—</span>'
                        : `<div class="small">${bss}</div><div class="roster-mini-track"><div class="roster-mini-fill" style="width:${bss}%; background:${rosterColor(bss)}"></div></div>`;
                    if (atsCell) atsCell.innerHTML = ob2Missing
                        ? '<span class="roster-ob2-na" title="Menunggu data OB2…">—</span>'
                        : `<div class="small">${ats}</div><div class="roster-mini-track"><div class="roster-mini-fill" style="width:${ats}%; background:${rosterColor(ats)}"></div></div>`;
                    const scoreCell = row.querySelector('.roster-score-cell');
                    if (scoreCell) {
                        scoreCell.title = _scoreTooltip(r.components);
                        scoreCell.innerHTML = `<strong style="color:${scoreColor(r.stage_score)}">${r.stage_score}</strong>`;
                    }
                    const stageCell = row.querySelector('.roster-stage-cell');
                    if (stageCell) {
                        const st = rosterStageFromLabel(r.stage_label);
                        stageCell.innerHTML = `<span class="roster-stage ${st.cls}">${st.label}</span>`;
                    }
                    // Update pressure sparkline on micro tick
                    const sparkCell = row.querySelector('.roster-spark-cell');
                    if (sparkCell) sparkCell.innerHTML = pressureSpark(r.pressure_trail);
                });
                return;
            }

            // Full re-render (minute tick)
            const html = sorted.map((r) => {
                const ob2  = r.ob2_indicator ?? {};
                const bss  = ob2.bss ?? 50;
                const ats  = ob2.ats ?? 50;
                const ob2Missing = ob2.missing !== false; // true when no OB2 data yet
                const st   = rosterStageFromLabel(r.stage_label);
                const logo = `${WORKER_BASE_URL}/logo?symbol=${encodeURIComponent(r.code)}`;
                const staleClass = _rosterIsStale ? 'roster-stale-row' : '';
                // Merge footprint data (CVD only)
                const fp = _footprintMap.get(r.code) || {};
                const cp = _closePriceMap.get(r.code) || {};
                const sc = _sectorCvdMap.get(r.code) || {};
                // VALUE = IPOT unsigned trading value (always positive).
                const displayValue = r.value || 0;
                // CVD: sector-scrapper TradedSummary primary (862 symbols), footprint as fallback
                const displayCvd = (sc.cvd_lot != null) ? sc.cvd_lot : (fp.cvd ?? null);
                // LAST PRICE: IPOT WS is primary (real-time), yfinance close as fallback
                const displayLastPrice = (r.last_price > 0) ? r.last_price : (cp.close > 0 ? cp.close : 0);
                // CHG%: IPOT WS is primary (same source as IPOT app screenshot)
                // Fallback to yfinance close-to-close when IPOT has no data
                let displayChgPct = 0;
                if (r.change_pct != null && r.change_pct !== 0) {
                    displayChgPct = r.change_pct;
                } else if (cp.close > 0 && cp.prev_close > 0) {
                    displayChgPct = ((cp.close - cp.prev_close) / cp.prev_close) * 100;
                } else if (fp.growth_pct != null && Number.isFinite(fp.growth_pct)) {
                    displayChgPct = fp.growth_pct;
                }
                // BID/OFFER cells: show "—" when OB2 data is missing
                const bssHtml = ob2Missing
                    ? '<span class="roster-ob2-na" title="Menunggu data OB2…">—</span>'
                    : `<div class="small">${bss}</div><div class="roster-mini-track"><div class="roster-mini-fill" style="width:${bss}%; background:${rosterColor(bss)}"></div></div>`;
                const atsHtml = ob2Missing
                    ? '<span class="roster-ob2-na" title="Menunggu data OB2…">—</span>'
                    : `<div class="small">${ats}</div><div class="roster-mini-track"><div class="roster-mini-fill" style="width:${ats}%; background:${rosterColor(ats)}"></div></div>`;
                return `<tr data-code="${r.code}" class="${staleClass}" onclick="window.location.href='emiten/broker-summary.html?kode=${encodeURIComponent(r.code)}'">
                    <td><strong>${r.rank_now}</strong></td>
                    <td>
                        <span class="roster-code">
                            <img class="roster-logo" src="${logo}" alt="${escapeHtml(r.code)}" onerror="this.style.display='none'">
                            <strong>${r.code}</strong>
                        </span>
                    </td>
                    <td class="text-end" style="font-size:0.9rem" title="Close: ${cp.close_date || '—'}&#10;Prev: ${cp.prev_close ? Number(cp.prev_close).toLocaleString('id-ID') : '—'} (${cp.prev_date || '—'})">${displayLastPrice > 0 ? Number(displayLastPrice).toLocaleString('id-ID') : '—'}</td>
                    <td class="${displayChgPct >= 0 ? 'text-success' : 'text-danger'}"><strong>${displayChgPct > 0 ? '+' : ''}${(displayChgPct || 0).toFixed(2)}%</strong></td>
                    <td class="text-end" style="font-size:0.9rem">${formatRosterValue(displayValue)}</td>
                    <td class="text-center">${formatCvd(displayCvd)}</td>
                    <td class="roster-spark-cell">${pressureSpark(r.pressure_trail)}</td>
                    <td class="roster-mini-ob2 roster-bss-cell">${bssHtml}</td>
                    <td class="roster-mini-ob2 roster-ats-cell">${atsHtml}</td>
                    <td class="roster-score-cell" title="${_scoreTooltip(r.components)}"><strong style="color:${scoreColor(r.stage_score)}">${r.stage_score}</strong></td>
                    <td class="roster-stage-cell"><span class="roster-stage ${st.cls}">${st.label}</span></td>
                </tr>`;
            }).join('');
            tbody.innerHTML = html;
            _applySortUI();
        }

        function updateWsBadge(status) {
            const badge = document.getElementById('roster-ws-badge');
            const label = document.getElementById('roster-ws-label');
            if (!badge || !label) return;
            badge.className = `ws-badge ${status.toLowerCase()}`;
            _rosterIsStale = (status === 'STALE');
            const map = { LIVE: 'LIVE', DEGRADED: 'DEGRADED', STALE: 'STALE' };
            label.textContent = map[status] ?? status;
        }

        function updateRosterTimestamp(ts) {
            const el = document.getElementById('roster-last-update');
            if (!el) return;
            el.textContent = `Update: ${new Date(ts).toLocaleTimeString('id-ID')}`;
        }

        let _rosterRows = [];
        let _rosterOrchestrator = null;
        let _rosterTokenRefreshTimer = null;
        let _rosterFirstDataTimeout = null;

        function _rosterLoadingStatus(msg, isError = false) {
            const row = document.getElementById('roster-loading-row');
            const txt = document.getElementById('roster-loading-text');
            if (!row) return;
            row.style.display = '';
            if (txt) {
                txt.textContent = msg;
                txt.className = isError ? 'roster-loading-error' : '';
            }
            // hide spinner on error
            const spinner = row.querySelector('.roster-spinner');
            if (spinner) spinner.style.display = isError ? 'none' : '';
        }

        function _hideRosterLoading() {
            const row = document.getElementById('roster-loading-row');
            if (row) row.remove();
        }

        async function startRosterLive() {
            const { MostActiveOrchestrator, fetchWsToken } = window.MostActivePipeline || {};
            if (!MostActiveOrchestrator) {
                console.error('[startRosterLive] MostActivePipeline not loaded');
                _rosterLoadingStatus('⚠ Pipeline module gagal dimuat.', true);
                return;
            }

            updateWsBadge('DEGRADED');
            _rosterLoadingStatus('Mengambil token WebSocket…');

            const token = await fetchWsToken();
            if (!token) {
                console.warn('[startRosterLive] no WS token — roster will stay empty.');
                _rosterLoadingStatus('⚠ Token WS tidak tersedia — set ipot_ws_token di localStorage lalu reload.', true);
                return;
            }

            // Cleanup previous instance if any
            if (_rosterOrchestrator) {
                try { _rosterOrchestrator.stop(); } catch (e) { console.warn(e); }
                _rosterOrchestrator = null;
            }
            if (_rosterFirstDataTimeout) {
                window.clearTimeout(_rosterFirstDataTimeout);
                _rosterFirstDataTimeout = null;
            }
            if (_rosterTokenRefreshTimer) {
                window.clearInterval(_rosterTokenRefreshTimer);
                _rosterTokenRefreshTimer = null;
            }

            const wsUrl = `wss://ipotapp.ipot.id/socketcluster/?appsession=${encodeURIComponent(token)}`;

            _rosterLoadingStatus('Menghubungkan ke IPOT WebSocket…');

            let _firstRosterReceived = false;

            // Guard: avoid infinite "menunggu data pertama" when upstream returns empty records
            // (e.g. market holiday / outside session / temporary upstream issue).
            _rosterFirstDataTimeout = window.setTimeout(() => {
                if (_firstRosterReceived) return;
                updateWsBadge('DEGRADED');
                _rosterLoadingStatus(
                    'Belum ada data live. Jika hari ini libur nasional / di luar jam bursa, ini normal. Coba refresh setelah sesi pasar berikutnya.',
                    true
                );
            }, 25000);

            const orchestrator = new MostActiveOrchestrator({
                wsUrl,
                topN: 10,
                onUpdate: ({ type, rows, ts }) => {
                    _rosterRows = rows;
                    if (!_firstRosterReceived && rows.length) {
                        _firstRosterReceived = true;
                        if (_rosterFirstDataTimeout) {
                            window.clearTimeout(_rosterFirstDataTimeout);
                            _rosterFirstDataTimeout = null;
                        }
                        _hideRosterLoading();
                    }
                    if (type === 'minute') {
                        renderRosterTable(rows, false);
                        updateRosterTimestamp(ts);
                    } else {
                        // 5s micro tick — partial update only
                        renderRosterTable(rows, true);
                    }
                },
                onStatus: (status) => {
                    updateWsBadge(status);
                    if (status === 'LIVE' && !_firstRosterReceived) {
                        _rosterLoadingStatus('Terhubung — menunggu data pertama…');
                    }
                    if (status === 'STALE') {
                        // Watermark existing rows
                        const rows = document.querySelectorAll('#roster-table tbody tr:not(#roster-loading-row)');
                        rows.forEach(r => r.classList.add('roster-stale-row'));
                    } else if (status === 'LIVE') {
                        const rows = document.querySelectorAll('#roster-table tbody tr:not(#roster-loading-row)');
                        rows.forEach(r => r.classList.remove('roster-stale-row'));
                    }
                }
            });

            orchestrator.start();
            _rosterOrchestrator = orchestrator;
            window._rosterOrchestrator = orchestrator; // expose for dev console

            // Wire external data provider: supplies CVD + divergence to scoring engine
            orchestrator.setExternalDataProvider((code) => {
                const sc = _sectorCvdMap.get(code) || {};
                const fp = _footprintMap.get(code) || {};
                const cp = _closePriceMap.get(code) || {};
                const cvd = (sc.cvd_lot != null) ? sc.cvd_lot : (fp.cvd ?? null);
                // Compute CHG% same as display logic
                let chg_pct = 0;
                const row = _rosterRows.find(r => r.code === code);
                if (row?.change_pct != null && row.change_pct !== 0) {
                    chg_pct = row.change_pct;
                } else if (cp.close > 0 && cp.prev_close > 0) {
                    chg_pct = ((cp.close - cp.prev_close) / cp.prev_close) * 100;
                } else if (fp.growth_pct != null && Number.isFinite(fp.growth_pct)) {
                    chg_pct = fp.growth_pct;
                }
                return {
                    cvd: cvd ?? 0,
                    div_detected: fp.div_detected ?? false,
                    div_score:    fp.div_score ?? 0,
                    div_type:     fp.div_type ?? null,
                    chg_pct
                };
            });

            // Fetch footprint summary for CVD + value (initial + every 2 min)
            _fetchFootprintSummary();
            setInterval(_fetchFootprintSummary, 120_000);

            // Fetch sector-scrapper CVD as fallback (initial + every 3 min)
            _fetchSectorCvd();
            setInterval(_fetchSectorCvd, 180_000);

            // Auto token refresh every 9 minutes (cache ttl is 10m on backend)
            _rosterTokenRefreshTimer = window.setInterval(async () => {
                try {
                    const fresh = await fetchWsToken();
                    if (!fresh || fresh === token) return;
                    console.log('[startRosterLive] token rotated, reconnecting roster WS...');
                    await startRosterLive();
                } catch (err) {
                    console.warn('[startRosterLive] token refresh check failed', err);
                }
            }, 9 * 60 * 1000);
        }

        document.addEventListener('DOMContentLoaded', () => {
            initializeDashboardRoute();
            scheduleTimelineLogoDotSync();
            startRosterLive();
        });

        window.addEventListener('resize', scheduleTimelineLogoDotSync);
    </script>
