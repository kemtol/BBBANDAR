<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw — Login</title>
<link rel="stylesheet" href="css/themes.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 0.875rem;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-wrap {
    width: 100%;
    max-width: 380px;
    padding: 16px;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 40px 36px;
  }

  .login-logo {
    text-align: center;
    margin-bottom: 28px;
  }

  .login-logo .mark {
    display: inline-block;
    width: 48px; height: 48px;
    background: var(--accent);
    border-radius: 6px;
    font-size: 1.375rem;
    font-weight: 700;
    line-height: 48px;
    color: #fff;
    margin-bottom: 12px;
  }

  .login-logo h1 {
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: .02em;
  }

  .login-logo .sub {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    font-size: 0.875rem;
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(99,102,241,.15);
  }

  .remember-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
    font-size: 0.8125rem;
    color: var(--text-muted);
  }

  .remember-row input[type="checkbox"] {
    width: 14px; height: 14px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .remember-row label { cursor: pointer; user-select: none; }

  .btn-login {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s;
  }

  .btn-login:hover { opacity: .85; }
  .btn-login:disabled { opacity: .5; cursor: default; }

  .error-msg {
    display: none;
    background: rgba(239,68,68,.1);
    border: 1px solid rgba(239,68,68,.3);
    border-radius: 6px;
    padding: 9px 12px;
    font-size: 0.8125rem;
    color: var(--red);
    margin-bottom: 16px;
    text-align: center;
  }

  .error-msg.visible { display: block; }

  .login-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 0.6875rem;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo">
      <div class="mark">OC</div>
      <h1>OpenClaw</h1>
      <div class="sub">Agent Dispatcher Dashboard</div>
    </div>

    <div class="error-msg" id="error-msg">Invalid email or password</div>

    <form id="login-form" onsubmit="return false;">
      <div class="field">
        <label for="inp-email">Email</label>
        <input type="email" id="inp-email" autocomplete="email" placeholder="you@example.com" required>
      </div>
      <div class="field">
        <label for="inp-pass">Password</label>
        <input type="password" id="inp-pass" autocomplete="current-password" placeholder="••••••••••••" required>
      </div>
      <div class="remember-row">
        <input type="checkbox" id="inp-remember">
        <label for="inp-remember">Remember me</label>
      </div>
      <button type="submit" class="btn-login" id="btn-login" onclick="doLogin()">Sign In</button>
    </form>

  </div>
  <div class="login-footer">OpenClaw v4 · Dispatcher running on vmi3141055</div>
</div>

<script src="auth.js"></script>
<script>
  // If already logged in, skip login page
  if (localStorage.getItem('oc_session')) {
    try {
      const s = JSON.parse(localStorage.getItem('oc_session'));
      const expiry = 8 * 60 * 60 * 1000;
      if (s.remember || Date.now() - s.ts <= expiry) {
        window.location.href = 'index.html';
      }
    } catch {}
  }

  async function doLogin() {
    const btn  = document.getElementById('btn-login');
    const err  = document.getElementById('error-msg');
    const email    = document.getElementById('inp-email').value.trim();
    const password = document.getElementById('inp-pass').value;
    const remember = document.getElementById('inp-remember').checked;

    if (!email || !password) return;

    btn.disabled    = true;
    btn.textContent = 'Signing in…';
    err.classList.remove('visible');

    try {
      const [eHash, pHash] = await Promise.all([sha256(email), sha256(password)]);

      if (eHash === AUTH_EMAIL_HASH && pHash === AUTH_PASS_HASH) {
        setSession(remember);
        window.location.href = 'index.html';
      } else {
        err.classList.add('visible');
        document.getElementById('inp-pass').value = '';
        document.getElementById('inp-pass').focus();
      }
    } catch (e) {
      err.textContent = 'Error during login. Please try again.';
      err.classList.add('visible');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Sign In';
    }
  }

  // Allow Enter key to submit
  document.getElementById('login-form').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
